<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login — OSINT Platform</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#060811;
color:#00ff88;
font-family:"Courier New", monospace;

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;
}

.login-box{

width:100%;
max-width:430px;

background:#0f1220;

padding:45px;

border:1px solid #00ff88;

border-radius:10px;

box-shadow:
0 0 25px rgba(0,255,136,.15);

}

.logo{

text-align:center;

margin-bottom:35px;

}

.logo h1{

color:#00ff88;

font-size:30px;

letter-spacing:5px;

}

.logo p{

color:#666;

font-size:12px;

margin-top:8px;

letter-spacing:2px;

}

.flash{

margin-bottom:18px;

padding:12px;

background:rgba(255,0,0,.08);

border:1px solid #ff3d3d;

color:#ff5f5f;

border-radius:5px;

font-size:13px;

}

label{

display:block;

margin-bottom:8px;

font-size:11px;

letter-spacing:2px;

color:#666;

text-transform:uppercase;

}

input{

width:100%;

padding:14px;

margin-bottom:18px;

background:#080b14;

color:#00ff88;

border:1px solid #1d2d25;

border-radius:5px;

outline:none;

font-family:inherit;

font-size:14px;

}

input:focus{

border-color:#00ff88;

box-shadow:0 0 10px rgba(0,255,136,.15);

}

.captcha{

margin-bottom:20px;

}

.captcha input{

margin-top:10px;

}

button{

width:100%;

padding:14px;

background:#00ff88;

border:none;

border-radius:5px;

color:#05080d;

font-weight:bold;

font-size:14px;

letter-spacing:3px;

cursor:pointer;

text-transform:uppercase;

}

button:hover{

opacity:.9;

}

.footer{

text-align:center;

margin-top:18px;

font-size:11px;

color:#555;

}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">

<h1>⬡ OSINT</h1>

<p>ADMIN ACCESS</p>

</div>


{% with messages = get_flashed_messages() %}
{% if messages %}
{% for msg in messages %}

<div class="flash">
{{ msg }}
</div>

{% endfor %}
{% endif %}
{% endwith %}


<form method="POST">

<label>Username</label>

<input
type="text"
name="username"
placeholder="admin"
autocomplete="username"
required
>


<label>Password</label>

<input
type="password"
name="password"
placeholder="••••••••"
autocomplete="current-password"
required
>


<!-- CAPTCHA -->

<div class="captcha">

{{ captcha|safe }}

</div>


<button type="submit">

LOGIN

</button>

</form>

<div class="footer">

OSINT Platform Security Layer Enabled

</div>

</div>

</body>
</html>
